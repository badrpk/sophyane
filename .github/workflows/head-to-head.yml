name: Sophyane vs LangGraph

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "benchmarks/**"
      - "src/sophyane/graph_runtime.py"
      - ".github/workflows/head-to-head.yml"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install identical test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install . "langgraph==1.2.9" "langgraph-checkpoint-sqlite>=3,<4"
      - name: Show installed versions
        run: |
          python - <<'PY'
          import importlib.metadata
          import platform
          print("Python", platform.python_version())
          print("Sophyane", importlib.metadata.version("sophyane"))
          print("LangGraph", importlib.metadata.version("langgraph"))
          PY
      - name: Run validated quick comparison
        run: python benchmarks/comprehensive.py --profile quick --output benchmark-results/comprehensive
      - name: Add report to job summary
        run: cat benchmark-results/comprehensive/REPORT.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: sophyane-vs-langgraph-${{ github.run_id }}
          path: benchmark-results/comprehensive
          if-no-files-found: error
          retention-days: 90
