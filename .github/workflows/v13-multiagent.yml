name: V13 multi-agent acceptance

on:
  pull_request:
    paths:
      - "src/sophyane/multiagent.py"
      - "src/sophyane/v13_cli.py"
      - "tests/test_multiagent.py"
      - "benchmarks/multiagent_acceptance.py"
      - ".github/workflows/v13-multiagent.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install v13
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Unit and integration tests
        run: python -m pytest tests/test_multiagent.py tests/test_graph_runtime.py tests/test_structured_output.py
      - name: Multi-agent class-B acceptance
        run: python benchmarks/multiagent_acceptance.py
      - name: CLI version
        run: sophyane --version
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v13-multiagent-${{ matrix.os }}-py${{ matrix.python }}
          path: benchmark-results/multiagent-v13
          if-no-files-found: error
          retention-days: 90
