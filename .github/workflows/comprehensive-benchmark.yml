name: Comprehensive benchmark

on:
  pull_request:
  workflow_dispatch:
    inputs:
      profile:
        description: Benchmark scale
        required: true
        default: standard
        type: choice
        options: [quick, standard, heavy]
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read

concurrency:
  group: comprehensive-benchmark-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  quick-matrix:
    if: github.event_name == 'pull_request'
    name: quick / ${{ matrix.os }} / repeat ${{ matrix.repeat }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        repeat: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install both runtimes
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install "langgraph==1.2.9" "langgraph-checkpoint-sqlite>=3,<4"
      - name: Record environment
        run: |
          python --version
          python -m pip show sophyane langgraph langgraph-checkpoint-sqlite
          python -c "import os,platform; print(platform.platform()); print('cpu_count=', os.cpu_count())"
      - name: Run quick comprehensive comparison
        run: python benchmarks/comprehensive.py --profile quick --output benchmark-results/comprehensive
      - name: Upload raw run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-${{ matrix.os }}-repeat-${{ matrix.repeat }}
          path: benchmark-results/comprehensive
          if-no-files-found: error
          retention-days: 90

  aggregate-quick:
    if: always() && github.event_name == 'pull_request'
    needs: quick-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: quick-*
          path: downloaded-results
      - name: Aggregate repeated cross-platform runs
        run: python benchmarks/aggregate_results.py downloaded-results --output benchmark-results/aggregate
      - name: Publish summary
        run: cat benchmark-results/aggregate/AGGREGATE.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: aggregate-quick-cross-platform-${{ github.run_id }}
          path: |
            downloaded-results
            benchmark-results/aggregate
          retention-days: 90

  profile-matrix:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: ${{ github.event_name == 'schedule' && 'standard' || inputs.profile }} / ubuntu / repeat ${{ matrix.repeat }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        repeat: [1, 2, 3, 4, 5]
    env:
      PROFILE: ${{ github.event_name == 'schedule' && 'standard' || inputs.profile }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install both runtimes
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install "langgraph==1.2.9" "langgraph-checkpoint-sqlite>=3,<4"
      - name: Record environment
        run: |
          python --version
          python -m pip show sophyane langgraph langgraph-checkpoint-sqlite
          lscpu || true
          free -h || true
      - name: Run selected profile
        run: python benchmarks/comprehensive.py --profile "$PROFILE" --output benchmark-results/comprehensive
      - name: Upload raw run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-${{ env.PROFILE }}-repeat-${{ matrix.repeat }}
          path: benchmark-results/comprehensive
          if-no-files-found: error
          retention-days: 90

  aggregate-profile:
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: profile-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: profile-*
          path: downloaded-results
      - name: Aggregate repeated profile runs
        run: python benchmarks/aggregate_results.py downloaded-results --output benchmark-results/aggregate
      - name: Publish summary
        run: cat benchmark-results/aggregate/AGGREGATE.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: aggregate-profile-${{ github.run_id }}
          path: |
            downloaded-results
            benchmark-results/aggregate
          retention-days: 90
