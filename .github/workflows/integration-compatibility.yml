name: Ecosystem compatibility

on:
  pull_request:
    paths:
      - "src/sophyane/integrations.py"
      - "tests/test_integrations.py"
      - "benchmarks/integration_acceptance.py"
      - "benchmarks/service_acceptance.py"
      - "requirements-integrations.txt"
      - ".github/workflows/integration-compatibility.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install Sophyane and integration matrix
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -r requirements-integrations.txt
      - name: Record resolved versions
        run: python -m pip freeze > integration-freeze.txt
      - name: Unit adapter tests
        run: python -m pytest tests/test_integrations.py tests/test_multiagent.py
      - name: Offline integration acceptance
        run: python benchmarks/integration_acceptance.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integrations-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            benchmark-results/integrations
            integration-freeze.txt
          if-no-files-found: error
          retention-days: 90

  persistence-services:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URI: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install compatibility environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements-integrations.txt
      - name: Verify real PostgreSQL and Redis services
        run: python benchmarks/service_acceptance.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: persistence-service-results
          path: benchmark-results/integrations
          if-no-files-found: error
          retention-days: 90
