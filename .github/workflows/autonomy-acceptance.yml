name: Bounded autonomy acceptance

on:
  pull_request:
    paths:
      - "src/sophyane/autonomy.py"
      - "src/sophyane/v13_cli.py"
      - "tests/test_autonomy.py"
      - ".github/workflows/autonomy-acceptance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test autonomy and existing harness
        run: python -m pytest tests/test_autonomy.py tests/test_harness.py tests/test_multiagent.py
      - name: Check CLI policy flags
        run: python -c "from sophyane.v13_cli import build_parser; a=build_parser().parse_args(['hello']); assert a.approval_timeout == 10.0 and not a.no_auto_continue"
