name: Execution evidence acceptance

on:
  pull_request:
  push:
    branches: [release/v13.0.0]
  workflow_dispatch:

jobs:
  evidence:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest tests/test_execution_evidence.py
      - run: python benchmarks/execution_evidence_acceptance.py
      - uses: actions/upload-artifact@v4
        with:
          name: execution-evidence-${{ matrix.os }}-py${{ matrix.python }}
          path: benchmark-results/execution-evidence
          retention-days: 90
