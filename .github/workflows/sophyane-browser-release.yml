name: Sophyane Browser package

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - "release/**"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build browser tarball
        run: bash browser/package.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sophyane-browser
          path: dist/sophyane-browser-*.tar.gz
      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sophyane-browser-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
