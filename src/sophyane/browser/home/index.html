<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#212121" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Sophyane</title>
  <meta name="description" content="Sophyane — ChatGPT-style agent chat for browser, new tab, and mobile app." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>" />
</head>
<body>
  <div class="shell">
    <!-- Sidebar (ChatGPT-like) -->
    <aside class="sidebar" id="sidebar">
      <button type="button" class="btn-new" id="btnNewChat">
        <span class="plus">＋</span> New chat
      </button>
      <div class="sidebar-scroll">
        <div class="sidebar-label">Today</div>
        <ul class="chat-list" id="chatList"></ul>
      </div>
      <div class="sidebar-bottom">
        <button type="button" class="side-link" id="btnTools">Tools &amp; status</button>
        <a class="side-link" href="https://github.com/badrpk/sophyane" target="_blank" rel="noopener">GitHub</a>
        <div class="user-pill">
          <span class="avatar">S</span>
          <span>Sophyane</span>
        </div>
      </div>
    </aside>

    <div class="overlay" id="overlay" hidden></div>

    <!-- Main chat column -->
    <div class="main">
      <header class="topbar">
        <button type="button" class="icon-btn" id="btnMenu" aria-label="Menu">☰</button>
        <div class="model-select" title="Sophyane agent">
          Sophyane <span class="chev">▾</span>
        </div>
        <div class="top-actions">
          <button type="button" class="icon-btn" id="btnShare" title="Copy chat">⤴</button>
        </div>
      </header>

      <!-- Empty state (ChatGPT home) -->
      <section class="empty" id="emptyState">
        <div class="empty-inner">
          <div class="empty-logo">◆</div>
          <h1>What can I help with?</h1>
          <div class="suggestions" id="suggestions">
            <button type="button" class="sug" data-q="Explain Sophyane hybrid edge compute in simple terms">Explain hybrid edge</button>
            <button type="button" class="sug" data-q="How do I install Sophyane and open the browser?">Install Sophyane</button>
            <button type="button" class="sug" data-q="Write a plan-act-verify agent loop in Python">Agent loop code</button>
            <button type="button" class="sug" data-q="Summarize https://example.com">Summarize a URL</button>
          </div>
        </div>
      </section>

      <!-- Messages (ChatGPT thread) -->
      <section class="thread" id="thread" hidden>
        <div class="thread-inner" id="threadInner"></div>
      </section>

      <!-- Composer (bottom, ChatGPT style) -->
      <footer class="composer-wrap">
        <form class="composer" id="composer">
          <textarea
            id="input"
            rows="1"
            placeholder="Message Sophyane…"
            enterkeyhint="send"
            autofocus
          ></textarea>
          <div class="composer-bar">
            <div class="composer-left">
              <label class="toggle" title="Prefer local / edge answer">
                <input type="checkbox" id="edgeMode" checked />
                <span>Edge</span>
              </label>
            </div>
            <button type="submit" class="send" id="btnSend" aria-label="Send" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
              </svg>
            </button>
          </div>
        </form>
        <p class="disclaimer">Sophyane can make mistakes. Verify important info. Local tools use APIs on this device when available.</p>
      </footer>
    </div>

    <!-- Tools drawer -->
    <div class="drawer" id="drawer" hidden>
      <div class="drawer-head">
        <strong>Tools &amp; status</strong>
        <button type="button" class="icon-btn" id="btnCloseDrawer">✕</button>
      </div>
      <div class="drawer-body">
        <button type="button" class="tool" data-tool="platform">Platform</button>
        <button type="button" class="tool" data-tool="hardware">Hardware</button>
        <button type="button" class="tool" data-tool="mesh">Mesh</button>
        <button type="button" class="tool" data-tool="train">Train</button>
        <pre id="toolOut" class="tool-out">Select a tool…</pre>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
